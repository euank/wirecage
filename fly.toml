app = "wirecagesrv"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  RUST_LOG = "info"
  WG_LISTEN = "fly-global-services:51820"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 0

[[services]]
  protocol = "udp"
  internal_port = 51820

  [[services.ports]]
    port = 51820
